# Project-wide Gradle settings.

# 1. FORCE THE JAVA HOME (Ensures compatibility with Jabba)
org.gradle.java.home=C:/Users/athar/.jabba/jdk/openjdk@1.17.0

# 2. LOCK JVM ARGUMENTS (Prevents "Incompatible Daemon" due to memory mismatches)
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

# 3. ENABLE PARALLEL BUILDS
org.gradle.parallel=true
org.gradle.configureondemand=true
org.gradle.caching=true

# AndroidX and React Native Defaults
android.useAndroidX=true
android.enableJetifier=true
reactNativeArchitectures=armeabi-v7a,arm64-v8a,x86,x86_64
newArchEnabled=false
hermesEnabled=true
