<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ASTA Registration - Welcome</title>
<!-- Tailwind CSS v3 CDN with plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts: Inter for a modern, professional look -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<style data-purpose="custom-theme">
    body {
      font-family: 'Inter', sans-serif;
    }
    /* Gradient Background as per prompt requirement */
    .bg-asta-gradient {
      background: linear-gradient(135deg, #E91E63 0%, #9C27B0 100%);
    }
    /* Custom shadow for the main card to look high-end */
    .card-shadow {
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
    }
  
    @keyframes pulse-red {
      0% { box-shadow: 0 0 0 0 rgba(233, 30, 99, 0.7); }
      70% { box-shadow: 0 0 0 15px rgba(233, 30, 99, 0); }
      100% { box-shadow: 0 0 0 0 rgba(233, 30, 99, 0); }
    }
    .animate-pulse-custom {
      animation: pulse-red 2s infinite;
    }
  </style>
</head>
<body class="bg-asta-gradient h-[812px] w-[375px] flex flex-col items-center mx-auto overflow-hidden relative">
<!-- BEGIN: HeaderSection -->
<header class="w-full pt-14 pb-4 text-center px-6" data-purpose="welcome-header">
<div class="mb-4"><span class="block text-white/60 text-[10px] font-bold uppercase tracking-[0.2em] mb-1">Step 1 of 6</span><h2 class="text-white/40 text-2xl font-light uppercase tracking-[0.3em]">IDENTITY</h2></div>
<h1 class="text-white text-[32px] font-bold leading-tight mt-12 mb-2">
        Welcome to ASTA
      </h1>
<p class="text-white/80 text-base font-medium">
        Your personal safety companion
      </p>
</header>
<!-- END: HeaderSection -->
<!-- BEGIN: MainContentCard -->
<main class="w-full flex-grow flex flex-col justify-end">
<div class="bg-black/80 backdrop-blur-xl p-8 card-shadow border-t border-x border-white/10 w-full" data-purpose="registration-card" style="border-top-left-radius: 40px; border-top-right-radius: 40px; min-height: 500px;">
<!-- Prompt Text Group -->
<div class="mb-8">
<h2 class="text-[#E91E63] text-2xl font-bold mb-2">
          Let's start with your name
        </h2>
<p class="text-white/70 text-sm">
          What should we call you?
        </p>
</div>
<!-- Input Field Group -->
<div class="relative mb-4" data-purpose="name-input-container">
<!-- Person Icon -->
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<svg class="h-6 w-6 text-gray-400" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<input aria-describedby="name-helper" class="block w-full pl-12 pr-4 py-4 bg-white/10 border-white/20 focus:border-[#E91E63] focus:ring-0 rounded-2xl text-white text-lg transition-colors duration-200 placeholder-white/40" id="full-name" name="full-name" placeholder="Full Name" type="text"/>
</div>
<p class="text-xs text-white/40 pl-2" id="name-helper">
        This helps personalize your experience
      </p>
</div>
</main>
<!-- END: MainContentCard -->
<!-- BEGIN: FooterNavigation -->
<footer class="w-full bg-black/80 backdrop-blur-xl pb-10 px-8 relative" data-purpose="footer-navigation">
<!-- Action Button (Floating Circular) -->
<div class="absolute -top-8 right-8 z-20">
<button aria-label="Next Step" class="bg-[#E91E63] hover:bg-[#D81B60] active:scale-95 text-white w-16 h-16 rounded-full shadow-[0_0_20px_rgba(233,30,99,0.4)] transition-all duration-200 flex items-center justify-center animate-pulse-custom" data-purpose="next-step-button" type="button">
<!-- Arrow Right Icon -->
<svg class="w-8 h-8" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M14 5l7 7m0 0l-7 7m7-7H3" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"></path>
</svg>
</button>
</div>
<!-- Login Link -->
<div class="text-center">
<p class="text-white text-sm">
        Already have an account? 
        <a class="font-bold underline ml-1 hover:text-white/90 text-[#E91E63]" href="#">Login</a>
</p>
</div>
</footer>
<!-- END: FooterNavigation -->
</body></html>
