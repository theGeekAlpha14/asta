<style>
        .liquid-gradient-bg {
            background: linear-gradient(-45deg, #240b36, #E91E63, #9C27B0, #1a0b2e);
            background-size: 400% 400%;
            animation: liquidMove 10s ease infinite;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 0;
        }
        @keyframes liquidMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .glass-panel {background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(20px);

            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.8);
        }
        .pulse-logo {
            animation: pulseGlow 3s infinite cubic-bezier(0.4, 0, 0.6, 1);
        }
        @keyframes pulseGlow {
            0%, 100% { 
                transform: scale(1); 
                filter: drop-shadow(0 0 5px rgba(233, 30, 99, 0.4));
            }
            50% { 
                transform: scale(1.08); 
                filter: drop-shadow(0 0 25px rgba(233, 30, 99, 0.8));
            }
        }
        .particle-shield {
            position: absolute;
            color: rgba(255, 255, 255, 0.05);
            pointer-events: none;
            z-index: 0;
            animation: floatShield 15s linear infinite;
        }
        .p1 { top: 10%; left: 10%; font-size: 80px; animation-duration: 25s; animation-delay: 0s; }
        .p2 { top: 70%; left: 80%; font-size: 120px; animation-duration: 30s; animation-delay: -5s; }

        .p4 { top: 80%; left: 20%; font-size: 90px; animation-duration: 28s; animation-delay: -2s; }
        @keyframes floatShield {
            0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 0.1; }
            50% { transform: translateY(-40px) rotate(10deg) scale(1.1); opacity: 0.2; }
            100% { transform: translateY(0) rotate(0deg) scale(1); opacity: 0.1; }
        }
        .input-glow:focus-within {
             box-shadow: 0 0 15px rgba(233, 30, 99, 0.5);
             border-color: #E91E63;
        }
        .shimmer-btn {
            position: relative;
            overflow: hidden;
            background: #E91E63;
            z-index: 1;
        }
        .shimmer-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(
                to right,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0.4) 50%,
                rgba(255, 255, 255, 0) 100%
            );
            transform: skewX(-25deg);
            animation: metallicShimmer 3s infinite;
            z-index: 2;
        }
        @keyframes metallicShimmer {
            0% { left: -100%; }
            20% { left: 200%; }100% { left: 200%; }}.custom-checkbox:checked {
            background-color: #E91E63;
            border-color: #E91E63;
        }
    </style>
