<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ASTA - Immersive Night Path</title>
<!-- BEGIN: External Scripts -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- END: External Scripts -->
<style data-purpose="custom-animations">
    @keyframes pulse-glow {
      0%, 100% { transform: scale(1); opacity: 1; box-shadow: 0 0 15px #E91E63; }
      50% { transform: scale(1.1); opacity: 0.8; box-shadow: 0 0 25px #E91E63; }
    }
    .animate-sos-pulse {
      animation: pulse-glow 2s infinite ease-in-out;
    }
    
    @keyframes route-flow {
      0% { stroke-dashoffset: 100; }
      100% { stroke-dashoffset: 0; }
    }
    .route-line-animation {
      stroke-dasharray: 10;
      animation: route-flow 5s linear infinite;
    }
  </style>
<style data-purpose="glassmorphism">
    .glass-panel {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
  </style>
<style data-purpose="map-perspective">
    /* Simulating a 3D tilted map perspective */
    .map-container {
      perspective: 1000px;
      background-color: #0a0a14;
      overflow: hidden;
    }
    .map-surface {
      transform: rotateX(45deg) translateY(-10%) scale(1.4);
      transform-origin: center bottom;
      background-image: 
        radial-gradient(circle at center, transparent 0%, #0a0a14 80%),
        linear-gradient(rgba(156, 39, 176, 0.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(156, 39, 176, 0.1) 1px, transparent 1px);
      background-size: 100% 100%, 50px 50px, 50px 50px;
    }
  </style>
</head>
<body class="bg-black text-white font-sans overflow-hidden">
<!-- BEGIN: Main Navigation Viewport -->
<main class="relative w-[375px] h-[812px] mx-auto overflow-hidden shadow-2xl border-x border-gray-900" id="app-container">
<!-- BEGIN: 3D Map Background -->
<div class="map-container absolute inset-0 w-full h-full" data-purpose="navigation-map">
<div class="map-surface absolute inset-0 w-full h-full">
<!-- Simulated Neon Route -->
<svg class="absolute inset-0 w-full h-full" fill="none" viewbox="0 0 400 800" xmlns="http://www.w3.org/2000/svg">
<!-- Route Shadow Glow -->
<path d="M200 700 L200 500 L100 400 L300 200 L300 50" stroke="#E91E63" stroke-linecap="round" stroke-width="12" style="filter: blur(15px); opacity: 0.4;"></path>
<!-- Primary Neon Route -->
<path class="route-line-animation" d="M200 700 L200 500 L100 400 L300 200 L300 50" stroke="#E91E63" stroke-linecap="round" stroke-width="6"></path>
<!-- Abstract Building Shapes for 3D feel -->
<rect fill="#1a1a2e" height="60" opacity="0.6" width="40" x="50" y="550"></rect>
<rect fill="#1a1a2e" height="80" opacity="0.6" width="60" x="250" y="450"></rect>
<rect fill="#1a1a2e" height="100" opacity="0.6" width="30" x="80" y="200"></rect>
</svg>
<!-- User Position Marker -->
<div class="absolute bottom-[100px] left-1/2 -translate-x-1/2 transform">
<div class="w-6 h-6 bg-[#E91E63] rounded-full border-4 border-white shadow-[0_0_20px_#E91E63]"></div>
<div class="absolute inset-0 w-12 h-12 -left-3 -top-3 border border-[#E91E63] rounded-full animate-ping opacity-50"></div>
</div>
</div>
</div>
<!-- END: 3D Map Background -->
<!-- BEGIN: Floating Navigation Instruction -->
<div class="absolute top-16 left-1/2 -translate-x-1/2 w-[90%] z-20" data-purpose="instruction-panel">
<div class="glass-panel rounded-2xl p-5 flex items-center gap-4 shadow-2xl border-l-4 border-l-[#E91E63]">
<div class="bg-[#E91E63] p-3 rounded-xl">
<svg class="h-8 w-8 text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M10 19l-7-7m0 0l7-7m-7 7h18" stroke-linecap="round" stroke-linejoin="round" stroke-width="3"></path>
</svg>
</div>
<div class="flex flex-col">
<span class="text-xs font-bold uppercase tracking-widest text-[#E91E63]">In 450 meters</span>
<span class="text-xl font-bold">Turn Left onto Neon Blvd</span>
</div>
</div>
</div>
<!-- END: Floating Navigation Instruction -->
<!-- BEGIN: Floating Side Actions -->
<div class="absolute right-4 top-1/2 -translate-y-1/2 flex flex-col gap-4 z-20" data-purpose="side-controls">
<!-- SOS Button -->
<button aria-label="SOS Emergency" class="animate-sos-pulse w-14 h-14 bg-[#E91E63] rounded-full flex items-center justify-center shadow-lg active:scale-95 transition-transform">
<span class="font-black text-white text-xs">SOS</span>
</button>
<!-- Map Layer/Recenter -->
<button aria-label="Recenter Map" class="glass-panel w-12 h-12 rounded-full flex items-center justify-center active:bg-white/20">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
<path d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</div>
<!-- END: Floating Side Actions -->
<!-- BEGIN: Arrival Status Bar -->
<footer class="absolute bottom-0 left-0 right-0 p-6 glass-panel rounded-t-[32px] border-t-0 z-30" data-purpose="status-bar">
<div class="flex items-center justify-between mb-6">
<div class="flex flex-col">
<span class="text-3xl font-black text-white">12<span class="text-sm font-medium text-gray-400 ml-1">min</span></span>
<span class="text-xs text-gray-400 uppercase tracking-tighter">Estimated Arrival</span>
</div>
<div class="flex flex-col items-end">
<span class="text-lg font-bold text-gray-200">2.4 <span class="text-sm text-gray-500">km</span></span>
<span class="text-xs text-[#9C27B0] font-bold">ETA 21:42</span>
</div>
</div>
<!-- Action Area -->
<div class="flex gap-4">
<button class="flex-1 bg-white/10 hover:bg-white/20 py-4 rounded-2xl font-bold text-sm transition-colors border border-white/5">
          Overview
        </button>
<button class="flex-[2] bg-[#E91E63] hover:bg-[#d81b60] py-4 rounded-2xl font-black text-sm uppercase tracking-widest shadow-[0_4px_20px_rgba(233,30,99,0.4)] transition-all active:scale-[0.98]">
          Exit
        </button>
</div>
<!-- Home Indicator (iOS Style) -->
<div class="w-32 h-1.5 bg-white/20 rounded-full mx-auto mt-6"></div>
</footer>
<!-- END: Arrival Status Bar -->
<!-- Top Status Overlay (Time/Signal) -->
<div class="absolute top-0 left-0 right-0 h-12 flex justify-between items-center px-8 z-50 pointer-events-none">
<span class="text-sm font-bold">21:30</span>
<div class="flex gap-1 items-center">
<div class="w-4 h-2.5 border border-white/50 rounded-sm relative">
<div class="absolute left-0 top-0 h-full bg-white w-2/3"></div>
</div>
</div>
</div>
</main>
<!-- END: Main Navigation Viewport -->
</body></html>
