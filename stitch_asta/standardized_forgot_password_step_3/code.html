<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#e92063",
                        "background-light": "#f8f6f6",
                        "background-dark": "#0a0507","grid-line": "rgba(233, 32, 99, 0.1)",
                    },
                    fontFamily: {
                        "display": ["Public Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                    animation: {
                        'scan': 'scan 3s cubic-bezier(0.4, 0, 0.2, 1) infinite',
                        'grid-move': 'gridMove 20s linear infinite',
                        'rotate-shield': 'rotateShield 10s linear infinite',
                        'orbit-1': 'orbit1 4s linear infinite',
                        'orbit-2': 'orbit2 5s linear infinite reverse',
                        'beam-pulse': 'beamPulse 4s ease-in-out infinite',
                    },
                    keyframes: {
                        scan: {
                            '0%': { transform: 'translateY(-100%)', opacity: '0' },
                            '10%': { opacity: '1' },
                            '90%': { opacity: '1' },
                            '100%': { transform: 'translateY(100vh)', opacity: '0' },
                        },
                        gridMove: {
                            '0%': { transform: 'translateY(0)' },
                            '100%': { transform: 'translateY(40px)' },
                        },
                        rotateShield: {
                            '0%': { transform: 'rotateY(0deg)' },
                            '100%': { transform: 'rotateY(360deg)' },
                        },
                        orbit1: {
                            '0%': { transform: 'rotate(0deg) translateX(80px) rotate(0deg)' },
                            '100%': { transform: 'rotate(360deg) translateX(80px) rotate(-360deg)' },
                        },
                        orbit2: {
                            '0%': { transform: 'rotate(0deg) translateX(100px) rotate(0deg)' },
                            '100%': { transform: 'rotate(360deg) translateX(100px) rotate(-360deg)' },
                        },
                        beamPulse: {
                            '0%, 100%': { opacity: '0.3', height: '60%' },
                            '50%': { opacity: '0.6', height: '80%' },
                        }
                    }
                },
            },
        }
    </script>
<style>
        .grid-bg {
            background-image: 
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 40px 40px;
            perspective: 1000px;
            transform-style: preserve-3d;
            transform: perspective(300px) rotateX(20deg);
            opacity: 0.2;
        }
        .scanning-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #e92063, transparent);
            box-shadow: 0 0 20px #e92063, 0 0 40px #e92063;
            z-index: 5;
        }
        .liquid-fill {
            background: linear-gradient(90deg, #e92063, #ff4d8d);
            box-shadow: 0 0 15px #e92063;
        }
        .shield-container {
            perspective: 1000px;
        }
        .shield-3d {
            transform-style: preserve-3d;
        }
        .light-beam {
            background: linear-gradient(to bottom, transparent, rgba(233, 32, 99, 0.2), transparent);
            filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen relative overflow-hidden flex flex-col" style="width: 375px; height: 812px; margin: 0 auto; overflow: hidden; position: relative;">
<div class="fixed inset-0 bg-[#0a0507] z-0"></div>
<div class="fixed inset-[-100%] top-[-50%] h-[200%] w-[200%] grid-bg animate-grid-move z-0 pointer-events-none"></div>
<div class="scanning-line animate-scan pointer-events-none"></div>
<div class="fixed top-0 left-0 w-full h-full bg-gradient-to-b from-primary/5 via-transparent to-primary/5 z-0 pointer-events-none"></div>
<div class="relative z-10 flex flex-col h-full w-full mx-auto overflow-hidden">
<header class="flex items-center px-4 py-4 shrink-0">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-primary/10 text-primary hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="flex-1 text-center text-lg font-bold tracking-tight pr-10">ASTA Recovery</h2>
</header>
<div class="px-10 py-4 flex justify-center items-center shrink-0">
<div class="flex items-center justify-between w-full max-w-xs relative">
<div class="flex flex-col items-center gap-3 relative z-10">
<div class="relative flex items-center justify-center">
<div class="absolute w-8 h-8 rounded-full bg-primary/20 animate-pulse"></div>
<div class="w-4 h-4 rounded-full bg-primary shadow-[0_0_10px_rgba(233,32,99,0.6)]"></div>
</div>
<span class="text-xs font-bold tracking-widest text-primary">STEP 1</span>
</div>
<div class="flex-1 h-[2px] bg-slate-700/50 mx-2 self-start mt-2"></div>
<div class="flex flex-col items-center gap-3 relative z-10">
<div class="relative flex items-center justify-center">
<div class="absolute w-8 h-8 rounded-full bg-primary/20 animate-pulse delay-75"></div>
<div class="w-4 h-4 rounded-full bg-primary shadow-[0_0_10px_rgba(233,32,99,0.6)]"></div>
</div>
<span class="text-xs font-bold tracking-widest text-primary">STEP 2</span>
</div>
<div class="flex-1 h-[2px] bg-slate-700/50 mx-2 self-start mt-2"></div>
<div class="flex flex-col items-center gap-3 relative z-10">
<div class="relative flex items-center justify-center">
<div class="absolute w-8 h-8 rounded-full bg-primary/20 animate-pulse delay-150"></div>
<div class="w-4 h-4 rounded-full bg-primary shadow-[0_0_15px_rgba(233,32,99,0.8)]"></div>
</div>
<span class="text-xs font-bold tracking-widest text-primary">STEP 3</span>
</div>
</div>
</div>
<main class="flex-1 px-6 flex flex-col items-center justify-center relative overflow-hidden">
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-40 h-[100vh] light-beam animate-beam-pulse -z-10"></div>
<div class="relative w-56 h-56 mb-8 flex items-center justify-center shield-container">
<div class="absolute inset-0 flex items-center justify-center animate-spin-slow">
<div class="w-2 h-2 bg-white rounded-full shadow-[0_0_10px_white] animate-orbit-1 absolute"></div>
<div class="w-1.5 h-1.5 bg-primary rounded-full shadow-[0_0_10px_#e92063] animate-orbit-2 absolute"></div>
</div>
<div class="absolute inset-0 bg-primary/20 rounded-full blur-[60px] animate-pulse"></div>
<div class="relative z-10 animate-[pulse_3s_ease-in-out_infinite]">
<span class="material-symbols-outlined text-[120px] text-primary drop-shadow-[0_0_25px_rgba(255,255,255,0.8)] bg-clip-text bg-gradient-to-tr from-primary to-white/50" style="font-variation-settings: 'FILL' 1, 'wght' 200;">shield_lock</span>
</div>
<div class="absolute inset-0 border border-primary/30 rounded-full animate-[spin_8s_linear_infinite]"></div>
<div class="absolute inset-4 border border-dashed border-primary/20 rounded-full animate-[spin_12s_linear_infinite_reverse]"></div>
</div>
<div class="text-center space-y-4 relative z-10">
<div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-primary/10 border border-primary/20 mb-2 backdrop-blur-sm">
<span class="w-2 h-2 rounded-full bg-green-400 animate-pulse shadow-[0_0_8px_#4ade80]"></span>
<span class="text-[10px] font-bold tracking-widest text-primary uppercase">System Secured</span>
</div>
<h1 class="text-3xl font-bold text-white tracking-tight drop-shadow-lg">Password Reset</h1>
<p class="text-slate-300 text-sm leading-relaxed max-w-[280px] mx-auto font-light">
                    Your ASTA Intelligence Shield has been restored. You can now log in securely with your new credentials.
                </p>
</div>
<div class="w-full mt-10 space-y-4">
<button class="w-full bg-primary text-white hover:bg-primary/90 font-bold py-4 rounded-xl shadow-[0_0_25px_rgba(233,32,99,0.4)] transition-all flex items-center justify-center gap-2 group relative overflow-hidden h-14">
<div class="absolute inset-0 w-full h-full bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-full group-hover:animate-[shimmer_1.5s_infinite]"></div>
<span class="tracking-widest">RETURN TO LOGIN</span>
<span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform">login</span>
</button>
</div>
</main>
<div class="px-6 py-4 opacity-60 shrink-0">
<div class="flex justify-between items-center text-[10px] font-mono text-primary/40">
<span>SEC_ID: 993-XJ</span>
<div class="flex gap-1">
<div class="w-1 h-3 bg-primary/40 animate-[pulse_1s_ease-in-out_infinite]"></div>
<div class="w-1 h-2 bg-primary/40 animate-[pulse_1.2s_ease-in-out_infinite]"></div>
<div class="w-1 h-4 bg-primary/40 animate-[pulse_0.8s_ease-in-out_infinite]"></div>
<div class="w-1 h-2 bg-primary/40 animate-[pulse_1.5s_ease-in-out_infinite]"></div>
</div>
</div>
</div>
<nav class="border-t border-white/5 bg-background-dark/80 backdrop-blur-lg px-8 py-4 flex justify-between items-center z-20 shrink-0">
<a class="flex flex-col items-center gap-1 text-slate-500 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">home</span>
</a>
<a class="flex flex-col items-center gap-1 text-primary shadow-[0_0_15px_rgba(233,32,99,0.4)] rounded-full p-1" href="#">
<span class="material-symbols-outlined fill-1">shield</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-500 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">person</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-500 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">settings</span>
</a>
</nav>
</div>
</body></html>
