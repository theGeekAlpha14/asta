<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ASTA - Reset Password</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#e92063",
                        "background-light": "#f8f6f6",
                        "background-dark": "#211116",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Public Sans', sans-serif;
        }
        .gradient-bg {
            background: linear-gradient(135deg, #e92063 0%, #663344 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>body { background: linear-gradient(135deg, #211116 0%, #4a1d2e 50%, #211116 100%); }</style></head>
<body class="bg-[#211116] text-slate-100 min-h-screen font-display">
<div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden pb-10"><!-- Header -->
<div class="flex items-center p-4 pb-2 justify-between w-full max-w-[375px] mx-auto">
<button class="text-slate-100 flex size-12 shrink-0 items-center justify-center rounded-full hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">ASTA</h2>
</div>
<!-- Progress Indicator -->
<div class="flex w-full flex-row items-center justify-center gap-4 py-8">
<div class="flex flex-col items-center gap-2">
<div class="h-3 w-3 rounded-full bg-primary ring-4 ring-primary/30"></div>
<span class="text-[10px] uppercase tracking-wider font-bold text-primary">Step 1</span>
</div>
<div class="h-[2px] w-8 bg-primary"></div>
<div class="flex flex-col items-center gap-2">
<div class="h-3 w-3 rounded-full bg-primary ring-4 ring-primary/30"></div>
<span class="text-[10px] uppercase tracking-wider font-bold text-primary">Step 2</span>
</div>
<div class="h-[2px] w-8 bg-slate-700"></div>
<div class="flex flex-col items-center gap-2">
<div class="h-3 w-3 rounded-full bg-slate-700"></div>
<span class="text-[10px] uppercase tracking-wider font-medium text-slate-500">Step 3</span>
</div>
</div>
<!-- Main Success Card -->
<div class="flex-1 flex items-center justify-center px-6">
<div class="w-full max-w-[327px] bg-[#1a0b10]/80 backdrop-blur-xl border border-white/5 rounded-[2.5rem] p-8 flex flex-col items-center shadow-2xl">
<!-- Success Icon -->
<div class="relative mb-10">
<div class="absolute inset-0 bg-primary/40 blur-2xl rounded-full"></div>
<div class="relative w-24 h-24 bg-primary rounded-full flex items-center justify-center shadow-xl">
<span class="material-symbols-outlined text-white text-5xl">shield</span>
</div>
<!-- Sparkle Accents -->
<span class="material-symbols-outlined absolute -top-4 -left-4 text-primary opacity-60">flare</span>
<span class="material-symbols-outlined absolute -bottom-2 -right-4 text-primary opacity-60 scale-75">auto_awesome</span>
</div>
<h3 class="text-white text-3xl font-bold mb-4 font-display">Success!</h3>
<p class="text-slate-400 text-center text-base leading-relaxed mb-12">
            Your password has been reset successfully. You can now log in.
        </p>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-5 rounded-3xl transition-all shadow-lg shadow-primary/30 flex items-center justify-center gap-2 mb-12 group">
            Go to Login
            <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">login</span>
</button>
<p class="text-slate-600 text-[10px] font-medium uppercase tracking-widest text-center">
            Secure authentication powered by ASTA Systems
        </p>
</div>
</div></div>
</body></html>
