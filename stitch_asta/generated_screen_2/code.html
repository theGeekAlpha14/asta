<!DOCTYPE html>

<html class="h-full" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ASTA - Registration Step 3: Contact</title>
<!-- Tailwind CSS v3 CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'asta-pink': '#E91E63',
            'asta-purple': '#9C27B0',
            'asta-dark': '#121212',
          },
          animation: {
            'pulse-slow': 'pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          }
        }
      }
    }
  </script>
<style data-purpose="custom-layout">
    /* Custom background gradient matching the theme description */
    .bg-gradient-asta {
      background: linear-gradient(180deg, #E91E63 0%, #9C27B0 100%);
    }
    /* Glassmorphism effect for the card */
    .glass-card {
      background: rgba(18, 18, 18, 0.85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }
    /* Custom height for mobile-first layout */
    .screen-container {
      width: 375px;
      height: 812px;
      margin: 0 auto;
      overflow: hidden;
      position: relative;
    }
  </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
<!-- BEGIN: Mobile Screen Container -->
<div class="screen-container bg-gradient-asta shadow-2xl flex flex-col">
<!-- BEGIN: Top Navigation Header -->
<header class="p-6 flex justify-between items-center z-10">
<!-- Back Button -->
<button aria-label="Go back" class="text-white hover:opacity-80 transition-opacity" type="button">
<svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M15.75 19.5L8.25 12l7.5-7.5" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</button>
<!-- Progress Indicator (Implicitly centered by flex container layout) -->
<div class="flex flex-col items-center">
<span class="text-white font-bold text-sm">Step 3 of 6</span>
<span class="text-white/80 text-[10px] tracking-[0.2em] font-medium uppercase mt-0.5">Contact</span>
</div>
<!-- Empty div for header balance -->
<div class="w-6"></div>
</header>
<!-- END: Top Navigation Header -->
<!-- BEGIN: Brand Section -->
<section class="flex-grow flex flex-col items-center justify-start pt-8 pb-4">
<!-- Shield Logo (Similar to Screen_72) -->
<div class="w-20 h-20 rounded-full bg-white/10 flex items-center justify-center border border-white/20 shadow-[0_0_20px_rgba(233,30,99,0.3)]">
<svg class="w-10 h-10 text-asta-pink" fill="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path class="hidden" clip-rule="evenodd" d="M12 2.25c-5.385 0-9.75 4.365-9.75 9.75s4.365 9.75 9.75 9.75 9.75-4.365 9.75-9.75S17.385 2.25 12 2.25zM12.75 6a.75.75 0 00-1.5 0v6c0 .414.336.75.75.75h4.5a.75.75 0 000-1.5h-3.75V6z" fill-rule="evenodd"></path>
<path d="M11.645 20.91l-.007-.003-.022-.012a15.247 15.247 0 01-.383-.218 25.18 25.18 0 01-4.244-3.17C4.688 15.36 2.25 12.174 2.25 8.25 2.25 5.322 4.714 3 7.5 3c1.373 0 2.518.528 3.39 1.258a4.125 4.125 0 011.11 0c.871-.73 2.017-1.258 3.39-1.258 2.786 0 5.25 2.322 5.25 5.25 0 3.925-2.438 7.111-4.739 9.256a25.175 25.175 0 01-4.244 3.17 15.247 15.247 0 01-.383.219l-.022.012-.007.004-.003.001a.752.752 0 01-.704 0l-.003-.001z"></path>
</svg>
</div>
<h1 class="text-white text-3xl font-bold tracking-tight mt-4">ASTA</h1>
</section>
<!-- END: Brand Section -->
<!-- BEGIN: Form Card -->
<main class="glass-card flex-none h-[70%] rounded-t-[40px] px-8 pt-10 relative overflow-hidden">
<!-- Headline -->
<div class="mb-8">
<h2 class="text-white text-2xl font-semibold">How can we reach you?</h2>
<p class="text-white/60 text-sm mt-1">We'll use this to secure your account</p>
</div>
<!-- Registration Form -->
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-white/70 text-xs font-bold uppercase tracking-widest ml-1" for="email">Email</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<svg class="w-5 h-5 text-white/40" fill="none" stroke="currentColor" stroke-width="1.5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</div>
<input class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-12 pr-4 text-white placeholder-white/30 focus:outline-none focus:ring-2 focus:ring-asta-pink/50 focus:border-asta-pink transition-all" id="email" name="email" placeholder="name@asta.com" type="email"/>
</div>
</div>
<!-- Phone Field -->
<div class="space-y-2">
<label class="block text-white/70 text-xs font-bold uppercase tracking-widest ml-1" for="phone">Phone Number</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<svg class="w-5 h-5 text-white/40" fill="none" stroke="currentColor" stroke-width="1.5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 01-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</div>
<input class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-12 pr-4 text-white placeholder-white/30 focus:outline-none focus:ring-2 focus:ring-asta-pink/50 focus:border-asta-pink transition-all" id="phone" name="phone" placeholder="+1234567890" type="tel"/>
</div>
<p class="text-[10px] text-white/40 ml-1 italic">Format: +1234567890</p>
</div>
</form>
<!-- BEGIN: Action Controls -->
<div class="absolute bottom-28 right-8">
<!-- Next Button - Pulsing Animation -->
<button class="bg-asta-pink text-white w-14 h-14 rounded-full flex items-center justify-center shadow-[0_0_20px_rgba(233,30,99,0.5)] animate-pulse-slow hover:scale-105 transition-transform" data-purpose="next-button" type="button">
<svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M8.25 4.5l7.5 7.5-7.5 7.5" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</button>
</div>
<!-- END: Action Controls -->
<!-- BEGIN: Footer -->
<footer class="absolute bottom-10 left-0 w-full text-center">
<p class="text-white/60 text-sm">
          Already have an account? <a class="text-asta-pink font-semibold hover:underline" href="#">Login</a>
</p>
</footer>
<!-- END: Footer -->
</main>
<!-- END: Form Card -->
</div>
<!-- END: Mobile Screen Container -->
</body></html>
